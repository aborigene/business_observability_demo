apiVersion: dynatrace.com/v1beta1
kind: DynaKube
metadata:
  name: dynakube
  namespace: dynatrace
spec:
  # Replace with your Dynatrace environment URL
  apiUrl: https://YOUR_ENVIRONMENT_ID.live.dynatrace.com/api
  
  # Network zones (optional)
  # networkZone: demo-cluster
  
  # OneAgent configuration for full-stack monitoring
  oneAgent:
    classicFullStack:
      enabled: true
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      
      # Host properties for better organization
      env:
        - name: DT_TAGS
          value: "Environment=demo Application=loan-application Platform=eks"
        - name: DT_CLUSTER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
  
  # ActiveGate configuration (optional, for Kubernetes monitoring)
  activeGate:
    capabilities:
      - routing
      - kubernetes-monitoring
      - dynatrace-api
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    replicas: 1
