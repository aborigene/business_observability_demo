apiVersion: apps/v1
kind: Deployment
metadata:
  name: tier1-loan-submission
  namespace: loan-app
  labels:
    app: tier1
    tier: frontend
    component: loan-submission
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tier1
  template:
    metadata:
      labels:
        app: tier1
        tier: frontend
        component: loan-submission
        version: v1
    spec:
      containers:
      - name: loan-submission
        image: YOUR_ECR_REGISTRY/tier1-loan-submission:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "3000"
        - name: TIER2_URL
          valueFrom:
            configMapKeyRef:
              name: tier1-config
              key: TIER2_URL
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: tier1-config
              key: NODE_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: tier1-config
              key: LOG_LEVEL
        - name: UNAUTHORIZED_REGIONS
          valueFrom:
            secretKeyRef:
              name: tier1-secret
              key: UNAUTHORIZED_REGIONS
        - name: UNAUTHORIZED_CHANNELS
          valueFrom:
            secretKeyRef:
              name: tier1-secret
              key: UNAUTHORIZED_CHANNELS
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: tier1-service
  namespace: loan-app
  labels:
    app: tier1
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: tier1
