apiVersion: apps/v1
kind: Deployment
metadata:
  name: tier4-decision-engine
  namespace: loan-app
  labels:
    app: tier4
    tier: saas
    component: decision-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tier4
  template:
    metadata:
      labels:
        app: tier4
        tier: saas
        component: decision-engine
        version: v1
      annotations:
        # Disable OneAgent injection for SaaS simulation
        oneagent.dynatrace.com/inject: "false"
    spec:
      containers:
      - name: decision-engine
        image: YOUR_ECR_REGISTRY/tier4-decision-engine:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          name: http
          protocol: TCP
        env:
        - name: TIER5_URL
          valueFrom:
            configMapKeyRef:
              name: tier4-config
              key: TIER5_URL
        - name: APPROVAL_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: tier4-config
              key: APPROVAL_THRESHOLD
        - name: REJECTION_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: tier4-config
              key: REJECTION_THRESHOLD
        - name: DT_ENV_URL
          valueFrom:
            secretKeyRef:
              name: tier4-secret
              key: DT_ENV_URL
        - name: DT_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: tier4-secret
              key: DT_API_TOKEN
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: tier4-service
  namespace: loan-app
  labels:
    app: tier4
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: http
  selector:
    app: tier4
